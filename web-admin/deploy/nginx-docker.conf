# Docker 版 nginx vhost (与宿主 nginx 版 wiseflow-admin.nginx.conf 区别仅在 upstream).
# 这里跑在 web-admin 容器里, listen 80, proxy_pass 到 docker 网络上的 `api:8080`.
# 宿主端口绑定在 docker-compose.yml (默认 8082:80).

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    # API: 容器内通过 docker DNS 解析 `api`.
    location /v1/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    location = /healthz {
        proxy_pass http://api:8080/healthz;
        proxy_set_header Host $host;
    }

    location = /metrics {
        proxy_pass http://api:8080/metrics;
        proxy_set_header Host $host;
    }

    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
