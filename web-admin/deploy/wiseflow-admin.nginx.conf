# /etc/nginx/sites-available/wiseflow-admin
#
# Serves the React SPA built by web-admin/ and proxies the wiseflow Go API
# so the browser can use same-origin requests (no CORS).
#
# - Static SPA bundle lives at /opt/wiseflow/web-admin/dist
# - wiseflow-api listens on 127.0.0.1:8080 (see /etc/systemd/system/wiseflow-api.service)
#
# Reachable from LAN at http://192.168.1.205:8082/
server {
    listen 8082;
    listen [::]:8082;

    server_name _;
    root /opt/wiseflow/web-admin/dist;
    index index.html;

    access_log /var/log/nginx/wiseflow-admin.access.log;
    error_log  /var/log/nginx/wiseflow-admin.error.log;

    # Gzip the SPA assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    # API: passthrough to Go server. Keep request body small streaming.
    location /v1/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:8080/healthz;
        proxy_set_header Host $host;
    }

    location = /metrics {
        proxy_pass http://127.0.0.1:8080/metrics;
        proxy_set_header Host $host;
    }

    # Long-cache hashed assets.
    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # SPA fallback: any non-API path returns index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
