# WiseFlow compose. 一份 yaml 复用两个场景:
#
#   • 本地开发 (Mac):
#       docker compose up -d              # 起 postgres + redis + iii + iii-console
#   • 服务器全栈部署:
#       docker compose --profile prod up -d --build
#   • 跑迁移 (一次性):
#       docker compose --profile migrate run --rm migrator up
#
# 应用容器都打了 profile, 不带 --profile 不启动. 这样 Makefile 里现有的
# `make dev` (= docker compose up -d) 行为没变.

name: wiseflow

services:
  # --- Infrastructure ---

  postgres:
    image: pgvector/pgvector:pg16
    container_name: wiseflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wiseflow}
      POSTGRES_USER: ${POSTGRES_USER:-wiseflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_me}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wiseflow} -d ${POSTGRES_DB:-wiseflow}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wiseflow-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # 205 上有别的项目占了 6379 (mm-redis). 默认改成 6380 避撞,
    # 想改回 6379 set REDIS_HOST_PORT=6379 in .env.
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # iii engine v0.16.1 — 跑 docker 是因为原生二进制的 microVM 沙箱在 205 Ubuntu
  # 上跟 sshd 抢资源, 直接撂挂 sshd. 官方镜像设了 III_EXECUTION_CONTEXT=docker,
  # 内置 queue/state/http worker 不再走 microVM.
  iii:
    image: iiidev/iii:0.16.1
    container_name: wiseflow-iii
    restart: unless-stopped
    # 镜像里 user 是 65532 nonroot, /app/data 需要可写 — 用 volume 解决权限.
    volumes:
      - ./iii/config.yaml:/app/config.yaml:ro
      - iiidata:/app/data
    ports:
      - "${III_HTTP_HOST_PORT:-3111}:3111"     # HTTP worker, Go outbox POST 这里
      - "${III_WS_HOST_PORT:-49134}:49134"     # SDK worker WS connection
      - "${III_METRICS_HOST_PORT:-9464}:9464"  # prometheus
    healthcheck:
      test: ["CMD", "/app/iii", "--version"]
      interval: 10s
      timeout: 3s
      retries: 5

  # iii-console (浏览器 UI: DLQ / queue stats / OTel). 上游没出 docker 镜像,
  # 自己用 iii/Dockerfile.console 把 v0.16.1 musl binary 装进 alpine, build 后接 engine.
  iii-console:
    build:
      context: ./iii
      dockerfile: Dockerfile.console
      args:
        VERSION: "0.16.1"
        TARGET: x86_64-unknown-linux-musl
    image: wiseflow/iii-console:0.16.1
    container_name: wiseflow-iii-console
    restart: unless-stopped
    depends_on:
      iii:
        condition: service_started
    command:
      - "--host=0.0.0.0"
      - "--port=3113"
      - "--engine-host=iii"        # docker 网内直接服务名
      - "--engine-port=3111"
      - "--bridge-port=49134"
    ports:
      - "${III_CONSOLE_HOST_PORT:-3113}:3113"

  # --- Application (profile: prod) ---

  api:
    profiles: ["prod"]
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    image: wiseflow/api:local
    container_name: wiseflow-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      iii:
        condition: service_started
    environment:
      # Compose 这里的 environment 优先级高于 env_file, 所以网络相关的 URL 固定写死.
      DATABASE_URL: postgres://${POSTGRES_USER:-wiseflow}:${POSTGRES_PASSWORD:-dev_password_change_me}@postgres:5432/${POSTGRES_DB:-wiseflow}?sslmode=disable
      # iii engine 现在跑在 compose 网络里同名 service. outbox 走这里推事件.
      III_HTTP_URL: http://iii:3111
      PORT: "8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEV_USER_ID: ${DEV_USER_ID:?DEV_USER_ID required, run uuidgen and set it in .env}
      DEV_BEARER_TOKEN: ${DEV_BEARER_TOKEN:?DEV_BEARER_TOKEN required}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:?INTERNAL_TOKEN required}
      # docker 网络上, mastra 容器对 api 不是 loopback, 必须 false.
      INTERNAL_LOOPBACK: "false"
      MASTRA_HTTP_URL: http://mastra:9091
      OUTBOX_POLL_MS: ${OUTBOX_POLL_MS:-500}
      OUTBOX_BATCH: ${OUTBOX_BATCH:-10}
      OUTBOX_MAX_ATTEMPTS: ${OUTBOX_MAX_ATTEMPTS:-5}
    ports:
      - "${API_HOST_PORT:-8080}:8080"

  mastra:
    profiles: ["prod"]
    build:
      context: ./mastra
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    image: wiseflow/mastra:local
    container_name: wiseflow-mastra
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      iii:
        condition: service_started
    environment:
      # iii SDK worker 通过 WS 连到同 compose 网络里的 iii service.
      III_URL: ws://iii:49134
      WISEFLOW_API_URL: http://api:8080
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      LLM_API_KEY: ${LLM_API_KEY:?LLM_API_KEY required for mastra}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      ANALYST_MODEL: ${ANALYST_MODEL:-deepseek-chat}
      # 容器里必须 bind 0.0.0.0, 否则 api 容器调不到.
      MASTRA_HTTP_BIND: "0.0.0.0"
      MASTRA_HTTP_PORT: "9091"
      DATABASE_URL: postgres://${POSTGRES_USER:-wiseflow}:${POSTGRES_PASSWORD:-dev_password_change_me}@postgres:5432/${POSTGRES_DB:-wiseflow}?sslmode=disable
      # Optional. 不填走静默 no-op / fallback. 详见 mastra/.env.example.
      EXA_API_KEY: ${EXA_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      MASTRA_PG_SCHEMA: ${MASTRA_PG_SCHEMA:-mastra}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Mastra 不绑宿主端口, 只通过 docker 网络给 api 调.
    expose:
      - "9091"

  web-admin:
    profiles: ["prod"]
    build:
      context: ./web-admin
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    image: wiseflow/web-admin:local
    container_name: wiseflow-web-admin
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${ADMIN_HOST_PORT:-8082}:80"

  # --- Migrator (profile: migrate, one-shot) ---

  migrator:
    profiles: ["migrate"]
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-wiseflow}
      PGPASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_me}
      PGDATABASE: ${POSTGRES_DB:-wiseflow}
    volumes:
      - ./server/migrations:/migrations:ro
      - ./scripts/migrate-docker.sh:/usr/local/bin/migrate.sh:ro
    entrypoint: ["sh", "/usr/local/bin/migrate.sh"]
    command: ["up"]

volumes:
  pgdata:
  redisdata:
  iiidata:
